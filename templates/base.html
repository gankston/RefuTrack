<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #fff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #333;
            --text-secondary: #2b3a55;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --shadow: 0 0 15px rgba(0,0,0,.1);
            --table-header-bg: #2b3a55;
            --table-header-color: #fff;
            --low-stock-bg: #fff3cd;
            --stats-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            background: var(--bg-primary); 
            font-family: Inter, system-ui, sans-serif; 
            color: var(--text-primary); 
            padding: 2rem; 
            margin: 0; 
        }

        .container {
            background: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .navbar h1 {
            color: var(--text-secondary);
            font-weight: 600;
            margin: 0;
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            padding: 0.5rem 1rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }

        .btn-outline-primary {
            border-color: #0d6efd;
            color: #0d6efd;
        }

        .btn-outline-primary:hover {
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: #fff;
        }

        .btn-outline-success {
            border-color: #198754;
            color: #198754;
        }

        .btn-outline-success:hover {
            background-color: #198754;
            border-color: #198754;
            color: #fff;
        }

        .btn-outline-secondary {
            border-color: #6c757d;
            color: #6c757d;
        }

        .btn-outline-secondary:hover {
            background-color: #6c757d;
            border-color: #6c757d;
            color: #fff;
        }

        .btn-outline-danger {
            border-color: #dc3545;
            color: #dc3545;
        }

        .btn-outline-danger:hover {
            background-color: #dc3545;
            border-color: #dc3545;
            color: #fff;
        }

        .table {
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .table thead th {
            background: var(--table-header-bg);
            color: var(--table-header-color);
            border: none;
            font-weight: 600;
            padding: 1rem;
        }

        .table tbody td {
            padding: 1rem;
            border-color: var(--border-color);
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background-color: var(--bg-tertiary);
        }

        .badge {
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
        }

        .badge.bg-success {
            background-color: #198754 !important;
        }

        .badge.bg-warning {
            background-color: #ffc107 !important;
            color: #000 !important;
        }

        .badge.bg-danger {
            background-color: #dc3545 !important;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 2px solid var(--border-color);
            padding: 0.75rem 1rem;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .alert-info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
        }

        .alert-danger {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        /* Footer */
        footer {
            color: var(--text-muted);
            margin-top: 2rem;
        }

        footer hr {
            border-color: var(--border-color);
        }

        /* Stats cards */
        .stats-card {
            background: var(--stats-gradient);
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stats-card h3 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }

        .stats-card p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }

        /* Low stock warning */
        .low-stock {
            background-color: var(--low-stock-bg);
            border-left: 4px solid #ffc107;
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
        }

        /* Search form */
        .search-form {
            margin-bottom: 2rem;
        }

        .search-form input {
            border-radius: 8px 0 0 8px;
        }

        .search-form .btn {
            border-radius: 0 8px 8px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            
            .navbar .d-flex {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar d-flex justify-content-between align-items-center">
            <h1>🔧 {{ app_title }}</h1>
            <div class="d-flex align-items-center gap-2">
                <!-- Navigation Buttons -->
                <a class="btn btn-outline-primary btn-sm" href="/productos">📦 Productos</a>
                <a class="btn btn-outline-success btn-sm" href="/productos/nuevo">➕ Nuevo</a>
                <a class="btn btn-outline-secondary btn-sm" href="/exportar.csv">⬇ Exportar</a>
                <form action="/reiniciar" method="post" style="display:inline"
                      onsubmit="return confirm('¿Crear nueva base vacía? No se eliminarán anteriores.');">
                    <button class="btn btn-outline-danger btn-sm">⟲ Reiniciar</button>
                </form>
            </div>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
        
        <footer>
            <hr>
            <small>Inventario local · {{ current_time }}</small>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
