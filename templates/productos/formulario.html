{% extends "base.html" %}

{% block title %}{{ form_title }} - {{ app_title }}{% endblock %}

{% block content %}
    <h3>{{ form_title }}</h3>
    
    <form method="post" class="row gy-3">
        <div class="col-md-3">
            <label class="form-label">SKU *</label>
            <input name="sku" class="form-control" value="{{ producto.sku if producto else '' }}" required 
                   placeholder="Ej: RET-001">
            <div class="form-text">Código único del producto</div>
        </div>
        
        <div class="col-md-5">
            <label class="form-label">Nombre *</label>
            <input name="nombre" class="form-control" value="{{ producto.nombre if producto else '' }}" required
                   placeholder="Ej: Retén aceite">
        </div>
        
        <div class="col-md-4">
            <label class="form-label">Stock mínimo</label>
            <input name="stock_min" type="number" class="form-control" 
                   value="{{ producto.stock_min if producto else 0 }}" min="0">
            <div class="form-text">Alerta cuando el stock esté por debajo</div>
        </div>
        
        <div class="col-12">
            <label class="form-label">Descripción detallada</label>
            <textarea name="descripcion" class="form-control" rows="3"
                      placeholder="Ej: Retén aceite 45x62x10 doble labio, marca SKF...">{{ producto.descripcion if producto else '' }}</textarea>
        </div>
        
        <div class="col-md-3">
            <label class="form-label">Stock inicial</label>
            <input name="stock" type="number" class="form-control" 
                   value="{{ producto.stock if producto else 0 }}" min="0">
            <div class="form-text">Cantidad en inventario</div>
        </div>
        
        <div class="col-12">
            <button class="btn btn-success" type="submit">
                {% if producto %}💾 Actualizar{% else %}➕ Crear{% endif %}
            </button>
            <a class="btn btn-secondary" href="/productos">❌ Cancelar</a>
        </div>
    </form>
{% endblock %}
